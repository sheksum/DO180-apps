
Question
Hello Team,
Franklyn is approaching his 90-day employment date.  As you are interacting with him regularly, I need your feedback on the following areas:
1. Knowledge of our operating environment.
2. Ability to execute on operational tasks, daily work, tickets, etc.
3. Teamwork and collaboration, does Franklyn exhibit the behaviors that elevate the team's ability to deliver on our purpose. "Enable Calix product teams to develop and test world-class products in a robust hybrid infrastructure. Ensuring security, availability, efficiency and productivity are driving factors in our operational process and delivery."

General feedback, what is going well, what needs improvement, etc.

Please provide your feedback to me by Monday, 4/6.  Apologies for the short turn around time.
