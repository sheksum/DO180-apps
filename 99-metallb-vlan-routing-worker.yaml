apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  labels:
    machineconfiguration.openshift.io/role: worker
  name: 99-metallb-vlan-routing-worker
spec:
  config:
    ignition:
      version: 3.5.0
    storage:
      files:
        # Sysctl: disable rp_filter globally
        - path: /etc/sysctl.d/99-metallb-rp-filter.conf
          mode: 420
          contents:
            source: data:text/plain;charset=utf-8;base64,IyBEaXNhYmxlIHJldmVyc2UgcGF0aCBmaWx0ZXJpbmcgZm9yIE1ldGFsTEIgVklQIHRyYWZmaWMgb24gc2Vjb25kYXJ5IFZMQU4gaW50ZXJmYWNlcwojIFBhY2tldHMgYXJyaXZlIG9uIGJuZDAuMTc5eCBidXQgcmVzcG9uc2VzIHJvdXRlIHZpYSBici1leCAoYXN5bW1ldHJpYykKbmV0LmlwdjQuY29uZi5hbGwucnBfZmlsdGVyID0gMAo=
        # NetworkManager dispatcher: set rp_filter + add routes when VLAN interfaces come up
        - path: /etc/NetworkManager/dispatcher.d/99-metallb-vlan-routing
          mode: 493
          contents:
            source: data:text/plain;charset=utf-8;base64,
        # Main setup script
        - path: /usr/local/bin/metallb-vlan-routing-setup.sh
          mode: 493
          contents:
            source: data:text/plain;charset=utf-8;base64,
    systemd:
      units:
        - name: metallb-vlan-routing.service
          enabled: true
          contents: |
            [Unit]
            Description=MetalLB VLAN routing fixes (MASQUERADE + rp_filter + policy routes)
            After=ovs-configuration.service openvswitch.service NetworkManager.service network-online.target
            Wants=network-online.target

            [Service]
            Type=oneshot
            ExecStart=/usr/local/bin/metallb-vlan-routing-setup.sh
            RemainAfterExit=yes
            StandardOutput=journal
            StandardError=journal

            [Install]
            WantedBy=multi-user.target
