## Quick Reference

| I need to... | Template | Section |
|---|---|---|
| Expose an HTTP/S web app or API | HTTPRoute | Template A |
| Expose a TCP service (database, queue) | LoadBalancer Service | Template B |
| Expose HTTP with path/header routing | HTTPRoute (advanced) | Template C |
| Get a TLS certificate for my service | Certificate | Template D |
| Request persistent storage | PVC | Template E |
| Connect my app to MinIO (S3 object storage) | Shared Service | Template F |
| Connect my app to Milvus (vector database) | Shared Service | Template F |

---

## How to Use These Templates

Placeholders you need to replace:

- `<YOUR-APP-NAME>` -- your application name
- `<YOUR-NAMESPACE>` -- pai-dev, pai-test, or pai-prod
- `<YOUR-PORT>` -- the port your app listens on
- `<YOUR-HOSTNAME>` -- FQDN for your service

Do not modify anything outside the placeholders unless instructed. The annotations, labels, and references are pre-configured for the OCP-AI platform.

---

## Template A: HTTPRoute (HTTP/S Web App or API)

Use this when you have an HTTP-based application (web UI, REST API, etc.) that needs external access through the Gateway API.

### Prerequisites

1. Your application is deployed and running in pai-dev, pai-test, or pai-prod
2. You have a ClusterIP Service pointing to your pods

### Step 1: Create your Service (if you don't have one)

```yaml
apiVersion: v1
kind: Service
metadata:
  name: <YOUR-APP-NAME>
  namespace: <YOUR-NAMESPACE>
spec:
  selector:
    app: <YOUR-APP-NAME>
  ports:
    - name: http
      port: <YOUR-PORT>
      targetPort: <YOUR-PORT>
```

### Step 2: Create the HTTPRoute

```yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: <YOUR-APP-NAME>-route
  namespace: <YOUR-NAMESPACE>
spec:
  parentRefs:
    - name: pai-gateway
      namespace: openshift-ingress
      sectionName: https-dev    # Change: https-test or https-prod
  hostnames:
    - <YOUR-HOSTNAME>
  rules:
    - backendRefs:
        - name: <YOUR-APP-NAME>
          port: <YOUR-PORT>
```

### Step 3: Verify

```bash
# Check route is accepted
oc get httproute <YOUR-APP-NAME>-route -n <YOUR-NAMESPACE>

# Test
curl -sk https://<YOUR-HOSTNAME>
```

### Example: Airflow Web UI in pai-dev

```yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: airflow-route
  namespace: pai-dev
spec:
  parentRefs:
    - name: pai-gateway
      namespace: openshift-ingress
      sectionName: https-dev
  hostnames:
    - airflow-dev.apps.ocp-ai.calix.local
  rules:
    - backendRefs:
        - name: airflow-webserver
          port: 8080
```

