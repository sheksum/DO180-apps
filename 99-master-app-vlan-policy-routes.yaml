== Credential Retrieval Procedures ==

All secrets are sourced from HashiCorp Vault and synced to Kubernetes via 
ExternalSecrets Operator (ESO). Do not manually edit K8s secrets — update 
Vault and ESO will reconcile automatically.

1. MinIO Credentials (per environment):

   Vault paths:
     kv/pai/dev/minio-credentials
     kv/pai/test/minio-credentials
     kv/pai/prod/minio-credentials

   From Vault CLI (on plnx-admin):
     export VAULT_ADDR=https://plnx-vault.calix.local:8200
     vault kv get kv/pai/dev/minio-credentials

   From Kubernetes:
     # Username
     oc get secret minio-credentials -n pai-dev -o jsonpath='{.data.MINIO_ROOT_USER}' | base64 -d

     # Password
     oc get secret minio-credentials -n pai-dev -o jsonpath='{.data.MINIO_ROOT_PASSWORD}' | base64 -d

   Replace pai-dev with pai-test or pai-prod for other environments.

2. MinIO mc CLI access (from within cluster):

     oc exec -n pai-dev deploy/minio -- mc alias set local http://localhost:9000 $(oc get secret minio-credentials -n pai-dev -o jsonpath='{.data.MINIO_ROOT_USER}' | base64 -d) $(oc get secret minio-credentials -n pai-dev -o jsonpath='{.data.MINIO_ROOT_PASSWORD}' | base64 -d)
     oc exec -n pai-dev deploy/minio -- mc ls local/

3. Vault PKI / TLS Certificates:

   Vault PKI paths:
     Root CA:         pki_root/ca/pem
     Intermediate CA: pki_int/ca/pem

   Certificates are auto-issued by cert-manager via ClusterIssuer vault-issuer.
   To inspect a cert:
     oc get certificate -n pai-dev
     oc describe certificate <cert-name> -n pai-dev

4. Milvus uses the same MinIO credentials (minio-credentials secret) for 
   object storage access — no separate Milvus credentials needed.

5. ArgoCD:
   URL: https://openshift-gitops-server-openshift-gitops.apps.ocp-ai.calix.local
   Auth: OpenShift SSO (ADFS/Duo MFA)

