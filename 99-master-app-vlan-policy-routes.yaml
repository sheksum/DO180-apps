## Template C: HTTPRoute with Path or Header Routing

Use this when you need to route different URL paths or HTTP headers to different backend services.

### Path-Based Routing

```yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: <YOUR-APP-NAME>-routes
  namespace: <YOUR-NAMESPACE>
spec:
  parentRefs:
    - name: pai-gateway
      namespace: openshift-ingress
      sectionName: https-dev    # Change: https-test or https-prod
  hostnames:
    - <YOUR-HOSTNAME>
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: <PATH-1>
      backendRefs:
        - name: <SERVICE-1>
          port: <PORT-1>
    - matches:
        - path:
            type: PathPrefix
            value: <PATH-2>
      backendRefs:
        - name: <SERVICE-2>
          port: <PORT-2>
```

### Traffic Splitting (Canary Deployment)

```yaml
  rules:
    - backendRefs:
        - name: <YOUR-APP-V1>
          port: <YOUR-PORT>
          weight: 90
        - name: <YOUR-APP-V2>
          port: <YOUR-PORT>
          weight: 10
```

