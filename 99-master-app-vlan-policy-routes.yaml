### F.2 Milvus (Vector Database)

#### Endpoints

| Environment | Internal gRPC | External gRPC | Internal HTTP (health) |
|---|---|---|---|
| pai-dev | milvus.pai-dev.svc.cluster.local:19530 | 10.172.194.161:19530 | milvus.pai-dev.svc:9091 |
| pai-test | milvus.pai-test.svc.cluster.local:19530 | 10.172.198.161:19530 | milvus.pai-test.svc:9091 |
| pai-prod | milvus.pai-prod.svc.cluster.local:19530 | 10.172.202.161:19530 | under maintenance |

pai-prod Milvus is currently under maintenance. Use pai-dev or pai-test for development.

#### Authentication

No credentials required. Milvus does not have authentication enabled (internal cluster access only). Network isolation via NetworkPolicies will be added before release.

#### Reference in your Deployment

```yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: <YOUR-APP-NAME>
  namespace: <YOUR-NAMESPACE>
spec:
  template:
    spec:
      containers:
        - name: <YOUR-APP-NAME>
          env:
            - name: MILVUS_HOST
              value: "milvus.<YOUR-NAMESPACE>.svc.cluster.local"
            - name: MILVUS_PORT
              value: "19530"
```

#### Python (pymilvus) connection

```python
from pymilvus import connections, Collection, FieldSchema, CollectionSchema, DataType

connections.connect(
    alias="default",
    host=os.environ["MILVUS_HOST"],
    port=os.environ["MILVUS_PORT"],
)

fields = [
    FieldSchema(name="id", dtype=DataType.INT64, is_primary=True, auto_id=True),
    FieldSchema(name="embedding", dtype=DataType.FLOAT_VECTOR, dim=768),
    FieldSchema(name="text", dtype=DataType.VARCHAR, max_length=65535),
]
schema = CollectionSchema(fields, description="Document embeddings")

collection = Collection(name="documents", schema=schema)

index_params = {
    "metric_type": "COSINE",
    "index_type": "IVF_FLAT",
    "params": {"nlist": 1024},
}
collection.create_index("embedding", index_params)

# Insert
data = [
    [[0.1] * 768, [0.2] * 768],
    ["doc1 text", "doc2 text"],
]
collection.insert(data)

# Search
collection.load()
results = collection.search(
    data=[[0.1] * 768],
    anns_field="embedding",
    param={"metric_type": "COSINE", "params": {"nprobe": 10}},
    limit=5,
    output_fields=["text"],
)
```

#### Health check (from a pod)

```bash
curl -s http://milvus.<YOUR-NAMESPACE>.svc.cluster.local:9091/healthz
# Returns: {"status":"ok"} when healthy
```

#### Things to know

- Use gRPC port 19530 for SDK connections (pymilvus, Java, Go, Node.js)
- HTTP port 9091 is for health checks and RESTful API (limited functionality)
- LoadBalancer IPs (external gRPC) are for access from outside the cluster only
- Each environment is isolated -- collections in pai-dev are not visible in pai-test/prod
- Milvus stores vector data in MinIO automatically -- do not modify `milvus-bucket`

