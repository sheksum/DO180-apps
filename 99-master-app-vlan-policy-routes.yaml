| Request persistent storage if needed | Template E | App Team |
| Decide: HTTPRoute or LoadBalancer? | See Quick Reference | App Team + Infra |
| If HTTPRoute: create HTTPRoute YAML | Template A or C | App Team |
| If LoadBalancer: request IP from infra team | Template B | Infra Team |
| If LoadBalancer: create LB Service YAML | Template B | App Team |
| Request TLS certificate if needed | Template D | App Team |
| Request DNS record from infra team | -- | Infra Team |
| Verify connectivity end-to-end | Verify steps in each template | App Team |

