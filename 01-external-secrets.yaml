read -s -p "Directory Manager password: " DMPASS && echo
for H in cpeg-ipareplica ric-ipareplica01 nan-ipareplica01 sjc-ipareplica01 ric-ipareplica; do
  echo "=== $H ==="
  ldapsearch -x -H ldap://${H}.ipa.calix.local \
    -D "cn=Directory Manager" -w "$DMPASS" \
    -b "cn=users,cn=accounts,dc=ipa,dc=calix,dc=local" \
    "(uid=hsuma)" krbLastPwdChange krbPrincipalName 2>&1 \
    | grep -E "^krbLastPwdChange|^krbPrincipalName|result:|error|Can't contact"
done
unset DMPASS
