Hey Athira, found and fixed the name resolution issue. This was not a platform or infrastructure issue — DNS, networking, services, and routes were all working correctly.

The root cause was in the generic-agent application configuration. The AGENT_CARD_HOST env var was set to http://internal-agentmesh-generic-agent:9999 (a full URL). The app code in main.py wraps that with http:// and :port again, so the agent card was returning a malformed URL: http://http://internal-agentmesh-generic-agent:9999:9999. That's what failed to resolve.

I changed AGENT_CARD_HOST to just the hostname:

Before: AGENT_CARD_HOST=http://internal-agentmesh-generic-agent:9999
Agent card URL: http://http://internal-agentmesh-generic-agent:9999:9999

After: AGENT_CARD_HOST=internal-agentmesh-generic-agent
Agent card URL: http://internal-agentmesh-generic-agent:9999

For future reference, any env var that expects a hostname should be just the hostname — not a full URL with protocol and port. The application code handles those parts. Can you update this in your Helm chart or deployment config so it doesn't come back on the next deploy?

Let me know once you've confirmed it's working.



# BEFORE FIX - capture the malformed URL
echo "=== BEFORE FIX ==="
oc exec -n pai-dev deploy/internal-agentmesh-agent-gateway-service -- python3 -c "
import urllib.request, json
r = urllib.request.urlopen('http://internal-agentmesh-generic-agent:9999/.well-known/agent.json')
card = json.loads(r.read())
print('Agent Card URL:', card['url'])
"


# APPLY FIX
oc set env deploy/internal-agentmesh-generic-agent -n pai-dev AGENT_CARD_HOST=internal-agentmesh-generic-agent


oc rollout status deploy/internal-agentmesh-generic-agent -n pai-dev

# AFTER FIX - should show clean URL
echo "=== AFTER FIX ==="
oc exec -n pai-dev deploy/internal-agentmesh-agent-gateway-service -- python3 -c "
import urllib.request, json
r = urllib.request.urlopen('http://internal-agentmesh-generic-agent:9999/.well-known/agent.json')
card = json.loads(r.read())
print('Agent Card URL:', card['url'])
"
