# Is IPA fully up?
sudo ipactl status

# DS health — any replication conflicts, errors, or shutdown events?
sudo tail -100 /var/log/dirsrv/slapd-IPA-CALIX-LOCAL/errors

# KDC health
sudo tail -100 /var/log/krb5kdc.log

# Is DS actually serving requests or choking?
sudo systemctl status dirsrv@IPA-CALIX-LOCAL --no-pager

# Disk space on cpeg — /var/lib/dirsrv can blow up
df -h

# How many replicas does cpeg think it has, and are any segments broken?
sudo ipa-replica-manage list
sudo ipa topologysegment-find domain
sudo ipa topologysegment-find ca
