# One host, no filtering — let's see the whole response
ldapsearch -x -H ldap://cpeg-ipareplica.ipa.calix.local \
  -D "cn=Directory Manager" -W \
  -b "cn=users,cn=accounts,dc=ipa,dc=calix,dc=local" \
  "(uid=hsuma)" krbLastPwdChange krbPrincipalName krbTicketFlags


  sudo kadmin.local -q "getprinc hsuma" | grep -E "Attributes|Last password change|Number of keys|vno"

sudo ldapsearch -Y EXTERNAL -H ldapi://%2Fvar%2Frun%2Fslapd-IPA-CALIX-LOCAL.socket \
  -b "cn=users,cn=accounts,dc=ipa,dc=calix,dc=local" \
  "(uid=hsuma)" krbLastPwdChange krbTicketFlags krbPrincipalKey 2>&1 | grep -v "^#" | head -30
