# Re-create the HTTP service principal
kinit admin
ipa service-del HTTP/pln-ipamaster.ipa.calix.local 2>/dev/null
ipa service-add HTTP/pln-ipamaster.ipa.calix.local

# Also re-create ldap
ipa service-del ldap/pln-ipamaster.ipa.calix.local 2>/dev/null
ipa service-add ldap/pln-ipamaster.ipa.calix.local


# On pln
ipa-server-install --uninstall --ignore-topology-disconnect -U 2>/dev/null || true
mkdir -p /var/lib/ipa/sysrestore /var/lib/ipa/sysupgrade /etc/ipa


ldapsearch -Y EXTERNAL -H ldapi://%2Frun%2Fslapd-IPA-CALIX-LOCAL.socket \
  -b "dc=ipa,dc=calix,dc=local" \
  "(&(nsuniqueid=ffffffff-ffffffff-ffffffff-ffffffff)(objectclass=nstombstone))" \
  nsds50ruv 2>/dev/null | grep "nsds50ruv"


  ldapsearch -Y EXTERNAL -H ldapi://%2Frun%2Fslapd-IPA-CALIX-LOCAL.socket \
  -b "cn=mapping tree,cn=config" \
  "(objectclass=nsds5replicationagreement)" cn \
  2>/dev/null | grep -i "pln"
