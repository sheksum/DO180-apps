	destination="`echo $destination| sed 's!___! !g'`"

	echo "Info: $caller: Uploading binary pkgs to $repository at $destination"

	if [ "$product" = "axos_mirror" ];then
		# Copy files directly from the transfer directory to an incoming directory for the AXOS Mirror.
		for fileURL in $filesInProspect;do
			for mirror in $mirrorRel;do
				file=`echo ${fileURL} | sed "s#^${nexusProspect}/${jira}/##"`
				sourcePath="${transferDir}/${file}"
				mirrorPath="/tools/sw/exa_2.0/${mirror}"
				if [ ! -d ${mirrorPath} ];then
					mkdir -p ${mirrorPath}
					chmod 0777 ${mirrorPath}
				fi
				targetPath="${mirrorPath}/${file}"
				command="cp ${sourcePath} ${targetPath}"
				$command
				exitCheck $?
				command="chmod a+rw ${targetPath}"
				$command
				exitCheck $?
			done
		done
	else
		# Otherwise, upload to final destination in Nexus.
