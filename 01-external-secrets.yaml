# Is SSSD online or offline for the domain?
sudo sssctl domain-status ipa.calix.local

# What does SSSD think of your user?
sudo sssctl user-checks <your-ipa-username>

# And the critical one — try to auth your user, watch what happens
sudo tail -f /var/log/sssd/krb5_child.log &
sudo tail -f /var/log/sssd/sssd_ipa.calix.local.log &
# In another shell or after starting tails, try:
su - <your-ipa-username>
# (enter new password, let it fail, then Ctrl+C the tails)
