Hey Deonna — dug into this before putting together steps so we're not flying blind.
Checked pln-hoffman: NFS mount is v3 with sec=sys, Apache is running mod_php 8.1 (no PHP-FPM, so we can't split the OSSUploads endpoint off to a different user), and local www-data is UID 48.
Then checked svm0 on the filer side: name service is set to LDAP → IPA for passwd and group lookups, no local UNIX user sitting at UID 48 so no collision, volume security style is unix, and pln-hoffman is covered by the SD_NFS export policy via the 10.174.0.0/16 rule.
So your approach works cleanly here. Steps:
1. Create IPA group + user:
   ipa group-add cpeg --desc="NFS write access to tools/sw/exa_2.0"
   ipa user-add www-data --first=www --last=data --shell=/usr/sbin/nologin --homedir=/var/www --setattr=uidNumber=48 --setattr=gidNumber=48
   ipa group-add-member cpeg --users=www-data

2. Fix target dir (from any client with /tools/sw mounted, as root):
   chgrp -R cpeg /tools/sw/exa_2.0
   chmod g+rws /tools/sw/exa_2.0
   chmod -R g+rw /tools/sw/exa_2.0

3. Verify on pln-hoffman:
   id www-data        # should show cpeg membership
   sudo -u www-data touch /tools/sw/exa_2.0/.test && rm /tools/sw/exa_2.0/.test
One thing worth flagging: local www-data needs to stay pinned at UID 48 on pln-hoffman across rebuilds — if it ever drifts, NFS perms break silently with no obvious error. Whatever config mgmt we use for that host should enforce it.
Let me know if you want me to run any of this.
