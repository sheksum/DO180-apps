# KDC and DS status
sudo ipactl status
sudo systemctl status krb5kdc --no-pager
sudo systemctl status dirsrv@IPA-CALIX-LOCAL --no-pager

# KDC log — this will show what happens when a client tries your new password
sudo tail -200 /var/log/krb5kdc.log

# DS errors — replication, backend issues
sudo tail -200 /var/log/dirsrv/slapd-IPA-CALIX-LOCAL/errors

# Replication agreements — any leftover pointing at dead hosts?
sudo ipa-replica-manage list
sudo ipa-csreplica-manage list

# Your principal as the KDC sees it — key version and last password change
sudo kadmin.local -q "getprinc hsuma"
