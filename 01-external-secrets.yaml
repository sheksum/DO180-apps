from typing import Annotated, Any, List

from pydantic import Field, field_validator
from pydantic_settings import BaseSettings, NoDecode


class Settings(BaseSettings):
    general_agent_id: str
    market_research_agent_id: str
    employee_engagement_agent_id: str
    web_search_agent_id: str
    atlassian_agent_id: str
    it_service_desk_agent_id: str
    app_name: str
    market_research_app_name: str
    employee_engagement_app_name: str
    web_search_app_name: str
    atlassian_app_name: str
    it_service_desk_app_name: str
    auth_service_url: str
    general_agent_baseurl: str
    market_research_agent_baseurl: str
    employee_engagement_agent_baseurl: str
    web_search_agent_baseurl: str
    atlassian_agent_baseurl: str
    it_service_desk_agent_baseurl: str
    database_name: str
    database_user: str
    database_password: str
    database_host: str
    database_port: int

    @property
    def database_url(self) -> str:
        return (
            f"postgresql+asyncpg://{self.database_user}:{self.database_password}"
            f"@{self.database_host}:{self.database_port}/{self.database_name}"
        )

    user_session_table: str
    events_table: str
    file_record_table: str
    chunk_size: int = 1024 * 512
    host: str = "0.0.0.0"
    port: int = 8089
    query_timeout: float
    connection_timeout: float
    agent_card_path: str
    allowed_authors: Annotated[list[str], NoDecode] = Field(min_items=1)
    postgres_db_url: str
    postgres_async_db_url: str
    file_upload_base_url: str
    atlassian_client_id: str
    atlassian_client_secret: str
    atlassian_token_url: str
    fernet_secret: str
    token_expiry_buffer_seconds: int

    @field_validator("allowed_authors", mode="before")
    @classmethod
    def split_allowed_authors(cls, v: Any) -> List[str]:
        if isinstance(v, str):
            return [s.strip() for s in v.split(",") if s.strip()]
        return v


