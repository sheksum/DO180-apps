Hi Deonna,

I spent some time digging into this across both the host and NetApp side before putting together steps.

On pln-hoffman, the NFS mount is v3 with sec=sys, so everything is UID-based (no Kerberos involved). Apache is running mod_php, so we can’t split OSSUploads into a separate service user.

On the filer side, LDAP is pointing to IPA and there’s no conflict with UID 48. Export policy and unix security style look good, so nothing there is blocking writes.

I also checked dispatcher.sh. It creates directories dynamically under /tools/sw/exa_2.0 and sets open permissions (0777 on dirs, a+rw on files). Because of that, we do need write access at the top level. Using the existing sw group keeps things simple and doesn’t change the current behavior.
