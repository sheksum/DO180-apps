Hey Deonna — spent some time digging into this before putting steps together, wanted to share what I found so we're on the same page.
Started on pln-hoffman. The NFS mount to the filer is v3 with sec=sys, which means it's pure UID-based auth — no Kerberos. Apache is running mod_php 8.1 with no PHP-FPM, so splitting the OSSUploads endpoint off to its own user isn't an option here. Local www-data is UID 48.
Then I went over to the NetApp side. svm0 is using LDAP → IPA for passwd and group lookups, there's no local UNIX user sitting at UID 48 that would collide, volume security style is unix, and pln-hoffman is covered by the SD_NFS export policy through the 10.174.0.0/16 rule. So your same-UID idea actually works really well here — nothing on the filer side blocks it.
I also pulled the part of dispatcher.sh that does the writes. The script creates subdirs at the top of /tools/sw/exa_2.0/ (one per "mirror" name from its input) and then does chmod 0777 on each new dir plus chmod a+rw on every file it copies. Two things come out of that — we do need group-write on the top-level exa_2.0 since the subdir names aren't known ahead of time, and honestly, adding sw group-write is stricter than what the script already does to its own output, so we're not loosening anything overall.
One tweak from your original plan: I'd skip cpeg — it's really a people group (9 engineers) and unrelated to this use case. The existing group on the dir is already sw, and builder is already in sw, so if we just add www-data to sw and turn on group-write, we don't disturb the current build flow at all. Minimum change, same result.
Steps:
1. Create www-data in IPA and add to sw:
   ipa user-add www-data --first=www --last=data --shell=/usr/sbin/nologin --homedir=/var/www --setattr=uidNumber=48 --setattr=gidNumber=48
   ipa group-add-member sw --users=www-data

2. From a client with /tools/sw mounted, as root:
   chmod g+rws /tools/sw/exa_2.0

3. Verify on pln-hoffman:
   id www-data
   sudo -u www-data touch /tools/sw/exa_2.0/.test && rm /tools/sw/exa_2.0/.test
   sudo -u www-data mkdir /tools/sw/exa_2.0/.testdir && rmdir /tools/sw/exa_2.0/.testdir
One thing to keep in mind going forward — local www-data on pln-hoffman has to stay at UID 48 across rebuilds. If it ever drifts, NFS perms break silently with no obvious error, so whatever config mgmt we use for that host should pin it.
@Aditya Singhania — tagging you since you opened the ticket. This is what we landed on after checking the NetApp config and the actual dispatcher.sh logic. Let us know if the write pattern lines up with what you expected.
