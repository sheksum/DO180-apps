# See what's actually in hsuma's persistent keyring
sudo keyctl show @u 2>/dev/null   # as root this shows root's, not useful
# Use this instead — find and dump hsuma's persistent keyring
KEYRING_ID=$(sudo -u hsuma keyctl get_persistent @s 13232 2>&1)
echo "$KEYRING_ID"
sudo -u hsuma keyctl show "$KEYRING_ID"


# Clear everything from hsuma's persistent keyring
sudo -u hsuma keyctl clear "$KEYRING_ID"

# Verify the count is back down
grep -E "^\s*13232:" /proc/key-users
