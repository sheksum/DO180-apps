# Is DS actually responsive right now, on loopback?
time ldapsearch -x -H ldap://localhost -s base -b "" "supportedLDAPVersion" 2>&1 | tail -5

# DS resource footprint
ps -o pid,pcpu,pmem,rss,vsz,nlwp,etime,stat,cmd -p $(pgrep ns-slapd)

# Disk on the DS data volume
df -h /var/lib/dirsrv

# Any current DS access log latency? Look at etime= values (in seconds) in recent operations
sudo tail -200 /var/log/dirsrv/slapd-IPA-CALIX-LOCAL/access | grep -oE "etime=[0-9.]+" | sort -u | tail -20
