Hey team, two updates.

The OCP-AI platform is now ready for workload deployments. An email has been sent to Brian to make the formal announcement to leadership. Full documentation including the architecture document, operations runbook, and onboarding templates is available on Confluence.

Also, we've moved authentication to Red Hat IdM (LDAP). The old htpasswd accounts have been removed. Going forward, use your IPA credentials to log in.

Web Console: https://console-openshift-console.apps.ocp-ai.calix.local
Select "ldap-ipa" on the login page and use your IPA username and password.

CLI:
oc login -u <your-ipa-username> https://api.ocp-ai.calix.local:6443 --insecure-skip-tls-verify

Vault:
https://vault.calix.local:8200
Select LDAP and use the same IPA credentials.

If you're not sure what your IPA username is, it's the short form (e.g. awkumar, ajayacha, sulsinha) not the old format (e.g. awanish.kumar).

Let me know if you hit any issues.
