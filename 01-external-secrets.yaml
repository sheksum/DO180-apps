# Is /home NFS-mounted?
mount | grep -E "home|krb5cc|/tmp"

# Quota on hsuma's home
sudo quota -u hsuma 2>/dev/null
sudo df -h /home/hsuma
sudo du -sh /home/hsuma

# Current ccache config in sssd.conf
grep -E "krb5_ccname_template|krb5_ccachedir|ccache" /etc/sssd/sssd.conf

# Keyring state (KEYRING:persistent:13232 is what it's trying to write)
sudo keyctl show @u 2>/dev/null
keyctl list @u 2>/dev/null | head -20
