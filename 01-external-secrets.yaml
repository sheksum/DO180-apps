Hey Sulabh, yes that's correct. The three namespaces (pai-dev, pai-test, pai-prod) are fully isolated environments. Each has its own dedicated VLAN, MetalLB IP pool, storage, and NetworkPolicies preventing cross-namespace traffic. MinIO and Milvus are deployed in all three. RBAC is tiered so the team has full admin in dev, edit in test, and view-only in prod with all prod deployments going through ArgoCD.
