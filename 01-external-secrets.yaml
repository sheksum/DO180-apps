Hi Brian,

The OCP-AI platform is now ready for the AI team to begin deploying workloads.

Over the past few weeks, the EngOps team has taken the environment from bare metal to a fully operational OpenShift 4.x platform consisting of three Cisco UCS-X control plane nodes and two Dell GPU worker nodes with a combined 8x NVIDIA H100L GPUs. The cluster provides three isolated environments for dev, test, and prod, with networking, storage, TLS, secrets management, GPU scheduling, and GitOps workflows fully operational.

Authentication is handled through RedHat IdM with group membership synchronized to the cluster. RBAC is enforced per environment so the AI team has full admin access in dev, edit access in test, and read-only access in prod. All production deployments are managed through ArgoCD.

Core platform services including MinIO, Milvus, and CloudNativePG are deployed and running across all three environments. PostgreSQL clusters can be deployed using the onboarding templates provided.

The AI team has already deployed its first workload, Triton inference server, into pai-dev, confirming the platform is functioning end to end.

All platform components are managed through ArgoCD, with 11 applications currently deployed and self-healing enabled, including the authentication stack. Vault is integrated with IdM so application teams can manage their own secrets, and NetworkPolicies enforce environment isolation.

The full documentation is available on Confluence:

• Architecture Document
• Service Onboarding Templates
• Operations Runbook

There are still a few items on the roadmap, but they do not block deployments in any of the environments. These include backup and disaster recovery, monitoring and alerting, centralized logging, MFA enablement, Vault PKI transition to the corporate CA, ResourceQuotas and LimitRanges once baseline usage data is available, ArgoCD LDAP integration for scoped access, and MinIO LDAP integration.

Thanks,
