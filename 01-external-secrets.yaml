# Get your current agent PID (the one you're using now) — skip killing this one
echo "Current agent: $SSH_AGENT_PID"

# Nuke all hsuma-owned ssh-agent processes
sudo pkill -u hsuma -f "ssh-agent -s"

# Wait a few seconds, then recheck
sleep 5
grep -E "^\s*13232:" /proc/key-users
ps -u hsuma -o pid,etime,cmd | grep ssh-agent | wc -l
