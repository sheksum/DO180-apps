for H in cpeg-ipareplica ric-ipareplica01 nan-ipareplica01 sjc-ipareplica01 ric-ipareplica; do
  echo "=== $H ==="
  sudo ldapsearch -Y GSSAPI -H ldap://${H}.ipa.calix.local \
    -b "cn=users,cn=accounts,dc=ipa,dc=calix,dc=local" \
    "(uid=hsuma)" krbLastPwdChange krbPrincipalName 2>&1 | grep -E "^krbLastPwdChange|^krbPrincipalName|error|Can't"
done
