# Can we reach cpeg on IPA ports?
nc -zv cpeg-ipareplica.ipa.calix.local 389
nc -zv cpeg-ipareplica.ipa.calix.local 88
nc -zv cpeg-ipareplica.ipa.calix.local 464

# LDAP reachability
ldapsearch -H ldap://cpeg-ipareplica.ipa.calix.local -x -b "dc=ipa,dc=calix,dc=local" -s base dn 2>&1 | head -20

# Host keytab — can this host even kinit itself?
sudo kinit -k -t /etc/krb5.keytab
sudo klist
