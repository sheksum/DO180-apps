# RKE2/Rancher Build — Meeting Notes

These are the things I want to say when each topic comes up. Written how I'd actually say them so I can read down as we go.

---

## When we get to networking

The pattern we landed on for OCP-AI works and I'd reuse it here rather than start from a blank page. Let me walk through what we actually did, because some of it isn't obvious until you've been in it.

**The VLAN model — three per environment.** One management VLAN shared across the whole cluster (1510 on OCP-AI, 10.172.248.0/24, native/untagged), then per environment a pair: an *infra* VLAN that's L2-only with no gateway, used purely for NFS traffic between nodes and the NetApp LIFs, and an *app* VLAN that's routed, where MetalLB hands out service IPs. So OCP-AI has 1792/1794 for dev, 1796/1798 for test, 1793/1797 for prod. Six storage VLANs total, plus management.

Reason for splitting infra and app — the infra VLAN doesn't need to be routed because the only thing on it is node-to-NetApp traffic. Keeping it L2-only means storage traffic can't accidentally egress through the wrong interface, and we don't have to think about return paths. The app VLAN has to be routed because external clients need to reach MetalLB VIPs from outside the cluster's VLANs. We tried collapsing them early on and it created routing headaches we kept tripping on.

**MTU 9000 end-to-end.** This is the thing I'll bang the table on. Switches, port channels (we have Po35 to NetApp at MTU 9216), bonds, VLAN interfaces, the bridge that K8s puts on top — every single layer needs to agree, or NFS will hang in ways that look like everything else. The switch SVIs on OCP-AI are at MTU 9216 (the extra headroom is intentional, you want the switch slightly higher than the hosts). On the Ubuntu side it's set in netplan and you just have to make sure it inherits down to the VLAN sub-interfaces.

**Bonding — what to use depends on what the switch team can give us.** On OCP-AI masters (UCS blades), we used active-backup with fabric failover turned OFF on the FI side, so the OS handles redundancy. The reason: with UCS, you can either let the Fabric Interconnect handle failover (fabric failover ON, OS sees one NIC) or do it yourself in the OS (failover OFF, OS sees two NICs and bonds them). We went OS-side because it gives us visibility — we can see in the OS when a path is down rather than it being silent at the FI layer.

On the GPU workers which had Mellanox ConnectX-7 NICs going to dedicated leaf switches, we used LACP 802.3ad at 100Gbps because the switches supported it and we wanted the throughput. For M5 blades I'd expect active-backup is the right call, same as the OCP-AI masters, but Gene should confirm based on what the network team can do for us on the switch side.

**Policy routing — the bit everyone forgets.** When you have multiple routed interfaces on a host (management on 1510, app on 1794), the kernel has to decide which interface to send return traffic out of. Default behavior is to use the route table's default gateway, which means traffic that came IN on the app VLAN tries to go OUT on management. The packet gets dropped at the switch because of reverse-path filtering, and you spend three days wondering why MetalLB services are unreachable from some networks but not others.

The fix is source-based policy routing. For each app VLAN, you add a routing rule: "if the source IP is in 10.172.194.0/23, use routing table 194, which has its default gateway as 10.172.194.1." We did this via MachineConfig on OCP-AI (the `99-worker-app-vlan-policy-routes` and `99-master-app-vlan-policy-routes` configs). On Ubuntu it'll be netplan with `routing-policy` rules, or systemd-networkd with RoutingPolicyRule sections. Same outcome, different syntax.

**One real war story to flag.** On OCP-AI we have a known limitation — eno6, the standby management NIC on the masters, had to be disabled (via `99-master-eno6-down`) because it was responding to ARP for MetalLB VIPs on the wrong interface. This cost us management redundancy on the masters — if Fabric A fails, masters lose management connectivity, though storage on bnd0 is fine because it spans both fabrics. We never went back and fixed it properly. For RKE2 I'd want to design around this from day one rather than inherit the same workaround. The right answer is probably either using the `arp_filter` and `arp_ignore` sysctls properly so the standby NIC doesn't answer for VIPs it shouldn't, or being more careful about which interface MetalLB binds to.

**One question for Gene — Rancher's default install assumes a flat network.** We need to be explicit early about how RKE2 binds to interfaces. If we don't tell it, it'll pick whatever interface has the default route (management), and then we end up trying to put MetalLB on a different VLAN and chasing the same ARP problems. Worth getting the node-ip and node-external-ip flags right at install time.

## On the OS decision

Happy with Ubuntu. LTS, whichever's current.

One thing I do want us to agree on though — these nodes should be IPA-joined like every other Linux box at Calix. I don't buy the "K8s nodes are cattle, keep them out of IPA" argument for an on-prem cluster like this. When someone needs to SSH into a node to debug something, they should be using their IPA creds and sudo rules like they would on any other host. It's a small ops win that pays off every time. And it means when someone leaves the team we're not chasing local accounts.

LVM on the boot disk for flexibility. Separate mount for wherever RKE2 keeps its state so we can grow it without reinstalling — we learned that one the hard way before.

For build process — if there's a standard PXE/kickstart setup we already use at Calix, let's use it. If not, Ubuntu autoinstall works well and this is a good chance to set that up properly. The main thing is the build needs to be reproducible. No hand-built nodes. If we can't rebuild a node from scratch in half an hour we've done something wrong.

For naming, I'd suggest something like `plnx-rke2-01-cp01` and `plnx-rke2-01-wk01`. The OCP-AI nodes are `ocp-ai-master01` and `ocp-ai-gpu01` — same spirit, distribution in the hostname so we can tell clusters apart as we grow.

## On the cluster itself

RKE2 via Rancher, agreed. On the name — I'd lean `plnx-rke2-01` over `plnx-k8s-01`. We already have OCP-AI which is also K8s, so naming by distribution avoids ambiguity later when we're talking across clusters.

Strong opinion on this one — build from scratch, don't migrate the existing Rancher config. I know there's appeal in preserving what's there but every ad-hoc decision that was made when Rancher was a side project will come forward with it. Fresh build lets us bake in IaC, naming standards, RBAC, storage classes the way we want from day one. The extra week of setup pays for itself the first time we don't have to explain why something is named weirdly or why a storage class has the wrong reclaim policy.

For RBAC, same tiered model as OCP-AI — engops is cluster-admin, app teams get scoped admin in dev, edit in staging or test, view in prod. Rancher handles LDAP and IPA natively, just point it at `cpeg-ipareplica.ipa.calix.local` and add the group sync. We've already solved this problem, just replicate it and save ourselves the rework.

## On addons

Going to push for ArgoCD over Fleet. Main reason is consistency with OCP-AI. If every engineer on this team has to re-learn tooling every time they move between clusters, we've made the platform harder to operate than it needs to be. Separate Bitbucket repo, same app-of-apps pattern, same selfHeal and prune. Fleet works fine but it's Rancher-specific and locks us in. ArgoCD is a small bit of extra setup for portability we'll appreciate later.

Trident obviously, same operator we use on OCP-AI, just new backends pointed at whatever SVM Deonna carves out. Whether we stand up a new SVM or extend the ones we already have is her call — both work, the tradeoff is isolation versus operational overhead.

NMState — less relevant on Ubuntu, it's really an OpenShift-flavored operator wrapping nmstate.io. On Ubuntu we'd do the equivalent via netplan or systemd-networkd, probably templated from the IaC layer. Same outcome, different mechanism.

MetalLB yes, L2 mode, per-environment IP pools, exactly the same as OCP-AI.

cert-manager yes, Vault issuer, same Vault server. But let's create a new PKI role for whatever the cluster hostname pattern is — don't reuse the OCP-AI PKI role, that would blur the trust boundaries.

On ingress — agreed that nginx is aging out. We went with Gateway API on Istio for OCP-AI. For this cluster, Traefik's Gateway API implementation is mature and plays nicer with Rancher, and we don't need Istio's complexity here. Happy to go with Traefik + Gateway API.

ESO yes, same Vault, but a new Kubernetes auth path — something like `kubernetes-rke2-01`, not the OCP-AI one. Per-namespace SecretStores like we have now.

System Upgrade Controller is standard RKE2 territory. We don't have an equivalent on OCP-AI because MCO handles upgrades there. This'll be new ground for us but it's well-documented, so not worried about it.

## When logging and monitoring comes up

Honest flag — this is a gap we also have on OCP-AI. I don't want us to rush into a per-cluster decision and end up with different stacks on different clusters. Worth treating this as a platform-level decision rather than just this build. Loki plus Grafana is the obvious choice, but if there's a Calix standard we should know about it. Let's not block the build on this — Gene and I can pair on it when I'm back.

## On the first apps

Vault already exists at `vault.calix.local` — we shouldn't reinstall it, the cluster should consume it.

Netbox is actually a good first workload. It's stateful, has a real database, needs LDAP for auth, needs ingress. It exercises storage, secrets, auth, and routing end-to-end. If Netbox runs clean we know the platform is working. Good POC target.

Beyond Netbox, I'd want to see Brian and Kishore's short list of legacy services they want modernized first before we commit to the next one.

## Things I want to raise before we wrap

Few things worth saying out loud even if they're not on the agenda.

First — I want us to be explicit that OCP-AI and this new cluster have different roles. OCP-AI is the AI/ML platform for MLOps on H100s. RKE2/Rancher is for general enterprise workloads and modernizing legacy services. Different users, different SLOs, different RBAC. Easier to hold that line now than try to claw it back in six months when someone asks why we have two clusters.

Second — three nodes is really the HA floor, not a steady state. Take one down for patching and we're tight. We should have capacity expansion on the roadmap from day one.

Third — everything goes in Git. No hand-built nodes, no clickops in the Rancher UI that isn't reflected in code. Same discipline we have on OCP-AI.

Fourth — secrets pattern from day one. Vault and ESO, don't take shortcuts. We did htpasswd first on OCP-AI and the migration to LDAP afterwards was not fun. Set it up right the first time.

Last — we should define what DR means for this cluster early. "Rebuildable from Git and backups" is realistic and achievable on this footprint. "Hot standby somewhere else" is a much bigger conversation with different budget implications. I'd set the first as Phase 1 and have the second as a known future item.

